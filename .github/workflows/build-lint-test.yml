name: Build, lint & test

permissions: {}
concurrency:
  group: 
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-build-lint-test
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main

env:
  TZ: "Europe/Amsterdam"

jobs:
  changes:
    name: Detect changes
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          persist-credentials: false
      - name: Filter changes for non-Markdown files
        id: filter
        run: | 
          if [[ "${GITHUB_REF_NAME}" == "main" ]] || [[ $(git diff --name-only "origin/${GITHUB_BASE_REF}" HEAD | grep -v "\.md$") ]]  ; then 
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: Rust format
    permissions:
      contents: read
    if: ${{ needs.changes.outputs.changed == 'true' }}
    needs: changes
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          persist-credentials: false

      - name: Setup Rust
        shell: bash
        run: >
          rustup update nightly &&
          rustup default nightly &&
          rustup component add --toolchain nightly rustfmt

      - name: Check rustfmt
        run: cargo --locked fmt --all -- --check

  rust:
    name: clippy, test & build
    permissions:
      contents: read
      issues: write
      pull-requests: write
    if: ${{ needs.changes.outputs.changed == 'true' }}
    needs: changes
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          persist-credentials: false

      - name: Setup Rust
        shell: bash
        run: >
          rustup update stable &&
          rustup default stable &&
          rustup component add --toolchain stable clippy rust-docs

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: eks

      - name: Tools cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: bin
          key: tools-cache-v1-${{ runner.os }}-${{ hashFiles('development/Cargo.toml', 'development/src/bin/*.rs', 'development/*.yml') }}

      - name: Setup project
        run: bin/init

      - name: Lint Typescript using Biome
        run: ./bin/biome ci --error-on-warnings ./frontend/scripts

      - name: Lint CSS using Biome
        run: ./bin/biome ci --error-on-warnings ./frontend/styles

      - name: Lint playwright tests using Biome
        run: ./bin/biome ci --error-on-warnings ./playwright/tests

      - name: Lint HTML with djlint
        run: |
          docker run --rm \
          -v ./templates:/work/templates \
          -v ./djlint.toml:/work/djlint.toml \
          djlint \
          djlint --lint --check --configuration=djlint.toml templates

      - name: Check Clippy with all features
        run: cargo --locked clippy --all-targets --all-features -- -D warnings

      - name: Check Clippy without default features
        run: cargo --locked clippy --all-targets --no-default-features -- -D warnings

      - name: Run tests
        run: cargo --locked test --features embed-typst -- --nocapture

      - name: Build docs
        run: cargo doc --workspace --no-deps --all-features

      - name: Build
        env:
          CARGO_SET_FEATURES: "memory-serve,fixtures,embed-typst"
        run: bin/build

      - name: Strip debug symbols
        run: strip target/release/eks

      - name: Upload binary to test server
        env:
          ETES_API_KEY: ${{ secrets.ETES_API_KEY }}
          SHA_PR: ${{ github.event.pull_request.head.sha || github.sha }}
          SHA_GH: ${{ github.sha }}
        run: |
          curl -s -v \
          --fail \
          -H "Authorization: Bearer $ETES_API_KEY" \
          -T ./target/release/eks \
          https://eks-test.nl/etes/api/v1/executable/${SHA_PR}/${SHA_GH}

      - name: Install diff-pdf
        if: ${{ github.event_name == 'pull_request' }}
        run: sudo apt-get update && sudo apt-get install -y diff-pdf-wx

      - name: Generate PDF diff summary
        if: ${{ github.event_name == 'pull_request' }}
        run: bin/pdf_diff

      - name: Check for diff artifacts
        if: ${{ github.event_name == 'pull_request' }}
        id: diff-artifacts
        shell: bash
        run: |
          if find tmp/diffs -type f | read -r _; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          fi
          
      - name: Upload diff artifacts
        if: ${{ github.event_name == 'pull_request' && steps.diff-artifacts.outputs.has_artifacts == 'true' }}
        id: artifact-upload
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pdf-diffs
          path: tmp/diffs/

      - name: Comment on PR with PDF diff summary and link to artifact
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          ARTIFACT_URL: ${{ steps.diff-artifacts.outputs.has_artifacts == 'true' && steps.artifact-upload.outputs.artifact-url || '' }}
        with:
          script: |
            const commentPdfDiffSummary = require('./.github/scripts/comment-pdf-diff-summary');
            await commentPdfDiffSummary({ github, context });

  playwright:
    name: Playwright tests
    permissions:
      contents: read
    if: ${{ needs.changes.outputs.changed == 'true' }}
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        shell: bash
        run: >
          rustup update stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: eks

      - name: Tools cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: bin
          key: tools-cache-v1-${{ runner.os }}-${{ hashFiles('development/Cargo.toml', 'development/src/*.rs', 'development/*.yml') }}

      - name: Setup project
        run: bin/init

      - name: Run playwright tests
        run: bin/test

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright/playwright-report/
          retention-days: 30

  audit-dependencies:
    name: Audit dependencies
    permissions:
      contents: read
    if: ${{ needs.changes.outputs.changed == 'true' }}
    needs: changes
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979
        with:
          arguments: --workspace --all-features

  zizmor:
    name: Lint workflow files with zizmor
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # Required for upload-sarif (used by zizmor-action) to upload SARIF files.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
